<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirect Prevent — Exceptions</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px;
      color: #333;
    }
    h1 { font-size: 20px; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .add-row input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .add-row input:focus { border-color: #4CAF50; }
    .add-row button {
      padding: 8px 18px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .add-row button:hover { background: #43a047; }
    #list { list-style: none; }
    #list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    #list li:hover { background: #fafafa; }
    #list .url { word-break: break-all; }
    #list .remove {
      background: none;
      border: none;
      color: #c62828;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      flex-shrink: 0;
      margin-left: 12px;
    }
    #list .remove:hover { color: #e53935; }
    .empty {
      text-align: center;
      color: #aaa;
      padding: 32px 0;
      font-size: 14px;
    }
    .error {
      color: #c62828;
      font-size: 12px;
      margin-top: -10px;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>&#128737; Exceptions</h1>
  <p class="subtitle">URLs matching these patterns will not be intercepted. Use * as wildcard. Note: some sites use www prefix (e.g. www.example.com) — add both variants or use *.example.com.</p>
  <div class="add-row">
    <input type="text" id="url-input" placeholder="e.g. google.com, *.github.com">
    <button id="add-btn">Add</button>
  </div>
  <div id="error" class="error"></div>
  <ul id="list"></ul>
  <script src="exceptions.js"></script>
</body>
</html>
